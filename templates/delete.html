<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление пользователя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .warning-message {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .warning-message i {
            font-size: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
        }

        .btn-cancel:hover {
            background: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }

        .result-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .result-message.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }

        .result-message.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }

        .result-message.info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .input-info {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Удаление пользователя</h1>
        <p class="subtitle">Введите ID пользователя для удаления</p>

        <div class="warning-message">
            <span>⚠️</span>
            <span>Внимание! Это действие нельзя отменить. Все данные пользователя будут безвозвратно удалены.</span>
        </div>

        <form id="deleteForm">
            <div class="form-group">
                <label for="userId">ID пользователя:</label>
                <input
                    type="number"
                    id="userId"
                    name="id_user"
                    required
                    min="1"
                    placeholder="Введите числовой ID пользователя"
                >
                <div class="input-info">Введите положительное целое число</div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-delete" id="submitBtn">
                    Удалить пользователя
                </button>
                <a href="/" class="btn btn-cancel">Отмена</a>
            </div>
        </form>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p style="margin-top: 10px; color: #666;">Удаление...</p>
        </div>

        <div id="resultMessage" class="result-message"></div>

        <a href="/" class="back-link">← Вернуться на главную</a>
    </div>

    <script>
        document.getElementById('deleteForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const userId = document.getElementById('userId').value;
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultMessage = document.getElementById('resultMessage');

            if (!userId || userId <= 0) {
                showResult('Пожалуйста, введите корректный ID пользователя (положительное число)', 'error');
                return;
            }

            // Блокируем кнопку и показываем загрузку
            submitBtn.disabled = true;
            loading.style.display = 'block';
            resultMessage.style.display = 'none';

            try {
                // Отправляем POST запрос на /delete с параметром id_user
                const response = await fetch('/delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        'id_user': userId
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult(`✅ ${data.message} (ID: ${userId})`, 'success');
                    document.getElementById('userId').value = ''; // Очищаем поле
                } else {
                    showResult(`❌ Ошибка: ${data.detail || 'Не удалось удалить пользователя'}`, 'error');
                }
            } catch (error) {
                showResult('❌ Ошибка соединения с сервером', 'error');
                console.error('Error:', error);
            } finally {
                // Разблокируем кнопку и скрываем загрузку
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function showResult(message, type) {
            const resultMessage = document.getElementById('resultMessage');
            resultMessage.textContent = message;
            resultMessage.className = `result-message ${type}`;
            resultMessage.style.display = 'block';

            // Автоматически скрываем сообщение через 5 секунд
            setTimeout(() => {
                resultMessage.style.display = 'none';
            }, 5000);
        }

        // Валидация ввода - только положительные числа
        document.getElementById('userId').addEventListener('input', function(e) {
            if (this.value < 0) {
                this.value = 1;
            }
        });

        // Добавляем поддержку клавиши Enter
        document.getElementById('userId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('deleteForm').dispatchEvent(new Event('submit'));
            }
        });

        // Предупреждение при попытке закрыть страницу во время удаления
        let isDeleting = false;

        document.getElementById('deleteForm').addEventListener('submit', function() {
            isDeleting = true;
        });

        window.addEventListener('beforeunload', function(e) {
            if (isDeleting) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
