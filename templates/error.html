<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка валидации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .error-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #fee;
        }

        .error-icon {
            width: 60px;
            height: 60px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(255, 71, 87, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);
            }
        }

        .error-title {
            flex: 1;
        }

        .error-title h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .error-title p {
            color: #666;
            font-size: 14px;
        }

        .error-type {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .error-type.name-error {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        .error-type.age-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .error-type.both-error {
            background: #cce5ff;
            color: #004085;
            border-left: 4px solid #007bff;
        }

        .error-message-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #e9ecef;
        }

        .error-field {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .error-field:last-child {
            margin-bottom: 0;
        }

        .error-field.name-field {
            background: linear-gradient(135deg, #fff3cd 0%, #fff9e6 100%);
            border-left: 4px solid #ffc107;
        }

        .error-field.age-field {
            background: linear-gradient(135deg, #f8d7da 0%, #fce8e9 100%);
            border-left: 4px solid #dc3545;
        }

        .error-field-icon {
            font-size: 24px;
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-field-content {
            flex: 1;
        }

        .error-field-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .error-field-message {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .error-field-hint {
            font-size: 14px;
            color: #666;
        }

        .error-details {
            background: #f1f3f5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .error-details-title {
            font-size: 14px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-details-list {
            list-style: none;
        }

        .error-details-list li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: #495057;
            font-size: 14px;
            border-bottom: 1px dashed #dee2e6;
        }

        .error-details-list li:last-child {
            border-bottom: none;
        }

        .error-details-list li:before {
            content: "•";
            position: absolute;
            left: 8px;
            color: #adb5bd;
        }

        .input-values {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-value-box {
            flex: 1;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .input-value-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .input-value {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .input-value.invalid {
            color: #dc3545;
            text-decoration: line-through;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #545b62;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }

        .error-tips {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 10px;
        }

        .error-tips-title {
            font-size: 14px;
            font-weight: 600;
            color: #004085;
            margin-bottom: 10px;
        }

        .error-tips-list {
            list-style: none;
        }

        .error-tips-list li {
            padding: 5px 0;
            padding-left: 20px;
            position: relative;
            color: #004085;
            font-size: 13px;
        }

        .error-tips-list li:before {
            content: "💡";
            position: absolute;
            left: 0;
            top: 5px;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="error-container" id="errorContainer">
        <!-- Шапка с ошибкой -->
        <div class="error-header">
            <div class="error-icon">⚠️</div>
            <div class="error-title">
                <h1>Ошибка валидации</h1>
                <p>Обнаружены проблемы с введёнными данными</p>
            </div>
        </div>

        <!-- Динамический контент будет вставлен через JavaScript -->
        <div id="errorContent"></div>

        <!-- Кнопки действий -->
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="goBack()">← Исправить данные</button>
            <a href="/" class="btn btn-secondary">На главную</a>
        </div>

        <div class="footer-note">
            Пожалуйста, исправьте ошибки и попробуйте снова
        </div>
    </div>

    <script>
        // Функция для получения параметров из URL
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                name: params.get('name'),
                age: params.get('age'),
                error_type: params.get('error_type') // 'name', 'age', 'both'
            };
        }

        // Функция для определения типа ошибки
        function getErrorType(name, age) {
            const nameError = !name || name.trim() === '' || name.length < 2 || name.length > 50 || !/^[a-zA-Zа-яА-Я\s-]+$/.test(name);
            const ageError = !age || isNaN(age) || age < 0 || age > 150 || !Number.isInteger(Number(age));

            if (nameError && ageError) return 'both';
            if (nameError) return 'name';
            if (ageError) return 'age';
            return null;
        }

        // Функция для получения сообщения об ошибке
        function getErrorMessage(errorType, name, age) {
            const messages = {
                name: {
                    empty: "Имя не может быть пустым",
                    tooShort: "Имя должно содержать минимум 2 символа",
                    tooLong: "Имя должно содержать максимум 50 символов",
                    invalid: "Имя может содержать только буквы, пробелы и дефисы",
                    default: "Некорректное имя пользователя"
                },
                age: {
                    empty: "Возраст не может быть пустым",
                    notNumber: "Возраст должен быть числом",
                    negative: "Возраст не может быть отрицательным",
                    tooHigh: "Возраст не может быть больше 150 лет",
                    notInteger: "Возраст должен быть целым числом",
                    default: "Некорректный возраст"
                }
            };

            if (errorType === 'name' || errorType === 'both') {
                if (!name || name.trim() === '') return messages.name.empty;
                if (name.length < 2) return messages.name.tooShort;
                if (name.length > 50) return messages.name.tooLong;
                if (!/^[a-zA-Zа-яА-Я\s-]+$/.test(name)) return messages.name.invalid;
                return messages.name.default;
            }

            if (errorType === 'age' || errorType === 'both') {
                if (!age || age === '') return messages.age.empty;
                if (isNaN(age)) return messages.age.notNumber;
                if (age < 0) return messages.age.negative;
                if (age > 150) return messages.age.tooHigh;
                if (!Number.isInteger(Number(age))) return messages.age.notInteger;
                return messages.age.default;
            }
        }

        // Функция для получения подсказки
        function getErrorHint(errorType) {
            const hints = {
                name: "Имя должно содержать только буквы, пробелы или дефисы. Длина: от 2 до 50 символов.",
                age: "Возраст должен быть целым числом от 0 до 150 лет.",
                both: "Проверьте правильность заполнения обоих полей."
            };
            return hints[errorType] || "Проверьте введённые данные";
        }

        // Основная функция отображения ошибки
        function displayError() {
            const params = getUrlParams();
            const name = params.name;
            const age = params.age;
            const errorType = params.error_type || getErrorType(name, age);

            if (!errorType) {
                // Если нет ошибки, перенаправляем на главную
                window.location.href = '/';
                return;
            }

            const errorMessage = getErrorMessage(errorType, name, age);
            const errorHint = getErrorHint(errorType);

            let errorContent = `
                <div class="error-type ${errorType}-error">
                    ${errorType === 'name' ? '❌ Ошибка в имени' :
                      errorType === 'age' ? '❌ Ошибка в возрасте' :
                      '❌ Ошибки в имени и возрасте'}
                </div>

                <div class="error-message-box">
                    ${errorType === 'name' || errorType === 'both' ? `
                        <div class="error-field name-field">
                            <div class="error-field-icon">👤</div>
                            <div class="error-field-content">
                                <div class="error-field-label">Ошибка в имени</div>
                                <div class="error-field-message">${errorType === 'name' ? errorMessage : getErrorMessage('name', name, age)}</div>
                                <div class="error-field-hint">${errorType === 'name' ? errorHint : getErrorHint('name')}</div>
                            </div>
                        </div>
                    ` : ''}

                    ${errorType === 'age' || errorType === 'both' ? `
                        <div class="error-field age-field">
                            <div class="error-field-icon">📅</div>
                            <div class="error-field-content">
                                <div class="error-field-label">Ошибка в возрасте</div>
                                <div class="error-field-message">${errorType === 'age' ? errorMessage : getErrorMessage('age', name, age)}</div>
                                <div class="error-field-hint">${errorType === 'age' ? errorHint : getErrorHint('age')}</div>
                            </div>
                        </div>
                    ` : ''}
                </div>

                <div class="input-values">
                    <div class="input-value-box">
                        <div class="input-value-label">Введённое имя</div>
                        <div class="input-value ${errorType === 'name' || errorType === 'both' ? 'invalid' : ''}">
                            ${name ? (name.length > 20 ? name.substring(0, 20) + '...' : name) : 'не указано'}
                        </div>
                    </div>
                    <div class="input-value-box">
                        <div class="input-value-label">Введённый возраст</div>
                        <div class="input-value ${errorType === 'age' || errorType === 'both' ? 'invalid' : ''}">
                            ${age ? age : 'не указан'}
                        </div>
                    </div>
                </div>

                <div class="error-details">
                    <div class="error-details-title">
                        <span>📋</span> Детали ошибки:
                    </div>
                    <ul class="error-details-list">
                        ${errorType === 'name' || errorType === 'both' ? `
                            <li>Поле "Имя": ${getErrorMessage('name', name, age)}</li>
                        ` : ''}
                        ${errorType === 'age' || errorType === 'both' ? `
                            <li>Поле "Возраст": ${getErrorMessage('age', name, age)}</li>
                        ` : ''}
                    </ul>
                </div>

                <div class="error-tips">
                    <div class="error-tips-title">💡 Рекомендации по исправлению:</div>
                    <ul class="error-tips-list">
                        <li>${errorHint}</li>
                        ${errorType === 'both' ? `
                            <li>Убедитесь, что имя содержит только буквы</li>
                            <li>Возраст должен быть целым числом от 0 до 150</li>
                        ` : ''}
                    </ul>
                </div>
            `;

            document.getElementById('errorContent').innerHTML = errorContent;
        }

        // Функция возврата с сохранением данных
        function goBack() {
            const params = getUrlParams();
            const name = params.name || '';
            const age = params.age || '';

            // Сохраняем введённые данные в localStorage для восстановления на форме
            localStorage.setItem('edit_name', name);
            localStorage.setItem('edit_age', age);

            window.history.back();
        }

        // Запускаем отображение при загрузке страницы
        document.addEventListener('DOMContentLoaded', displayError);

        // Добавляем поддержку клавиш
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
