<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава Python 🐍 - Уроки для начинающих</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Навигация */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            font-size: 36px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 40px;
        }

        .header p {
            color: #666;
            font-size: 18px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Вкладки уроков */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            min-width: 120px;
            padding: 15px;
            background: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tab:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab .tab-icon {
            font-size: 24px;
        }

        .tab .tab-title {
            font-size: 14px;
        }

        .tab .tab-lesson {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Основной контент */
        .content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lesson-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .lesson-header h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .lesson-header p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
        }

        .lesson-tags {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tag {
            background: #f0f0f0;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
        }

        .tag.important {
            background: #667eea20;
            color: #667eea;
            border: 1px solid #667eea;
        }

        /* Блоки с кодом */
        .code-block {
            background: #1e1e2f;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
        }

        .code-block pre {
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .code-block .code-comment {
            color: #6a9955;
        }

        .code-block .code-keyword {
            color: #569cd6;
        }

        .code-block .code-string {
            color: #ce9178;
        }

        .code-block .code-number {
            color: #b5cea8;
        }

        .code-block .code-function {
            color: #dcdcaa;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Интерактивные примеры */
        .interactive-demo {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }

        .demo-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .demo-content {
            background: white;
            border-radius: 10px;
            padding: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .demo-output {
            background: #1e1e2f;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }

        /* Карточки для уроков */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .card {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .card-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .card p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Таблицы */
        .table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .table tr:hover {
            background: #f8f9fa;
        }

        /* Викторина */
        .quiz-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .quiz-question {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .quiz-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quiz-option:hover {
            border-color: #667eea;
        }

        .quiz-option.selected {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .quiz-option.correct {
            border-color: #28a745;
            background: #d4edda;
        }

        .quiz-option.wrong {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .quiz-feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .quiz-feedback.show {
            display: block;
        }

        .quiz-feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .quiz-feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Навигация между уроками */
        .lesson-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .nav-btn {
            background: none;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: #667eea;
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .tabs {
                flex-direction: column;
            }

            .tab {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <span>🐍</span>
            Глава Python
        </h1>
        <p>Изучай Python с нуля в интерактивной форме! Простые уроки для начинающих</p>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- Вкладки уроков -->
    <div class="tabs" id="tabs">
        <button class="tab active" data-lesson="1">
            <span class="tab-icon">📝</span>
            <span class="tab-title">Урок 1</span>
            <span class="tab-lesson">print() и основы</span>
        </button>
        <button class="tab" data-lesson="2">
            <span class="tab-icon">🔄</span>
            <span class="tab-title">Урок 2</span>
            <span class="tab-lesson">if/else и переменные</span>
        </button>
        <button class="tab" data-lesson="3">
            <span class="tab-icon">⚡</span>
            <span class="tab-title">Урок 3</span>
            <span class="tab-lesson">Циклы и input()</span>
        </button>
        <button class="tab" data-lesson="4">
            <span class="tab-icon">📚</span>
            <span class="tab-title">Урок 4</span>
            <span class="tab-lesson">Списки и словари</span>
        </button>
    </div>

    <!-- Контейнер для контента -->
    <div class="content" id="lessonContent"></div>

    <script>
        const lessons = {
            1: {
                title: "Урок 1: Первая программа и команда print()",
                description: "Познакомимся с Python и научимся выводить текст на экран",
                tags: ["Основы", "print()", "Строки"],
                content: `
                    <div class="lesson-header">
                        <h2>📝 Что такое Python?</h2>
                        <p>Python — это простой и понятный язык программирования, который любят начинающие. Он похож на английский язык, поэтому его легко читать и писать!</p>
                        <div class="lesson-tags">
                            <span class="tag">🐍 Python 3</span>
                            <span class="tag important">✨ Для новичков</span>
                            <span class="tag">💻 Первая программа</span>
                        </div>
                    </div>

                    <h3>🎯 Команда print()</h3>
                    <p>Команда <strong>print()</strong> выводит текст или числа на экран. Это самая первая команда, которую изучают программисты!</p>

                    <div class="code-block">
                        <button class="copy-btn" onclick="copyCode(this)">📋 Копировать</button>
                        <pre>
<span class="code-comment"># Это комментарий - Python его игнорирует</span>
<span class="code-comment"># Выводим текст</span>
<span class="code-keyword">print</span>(<span class="code-string">"Привет, мир!"</span>)

<span class="code-comment"># Можно выводить числа</span>
<span class="code-keyword">print</span>(<span class="code-number">42</span>)

<span class="code-comment"># Можно выводить несколько значений</span>
<span class="code-keyword">print</span>(<span class="code-string">"Мне"</span>, <span class="code-number">10</span>, <span class="code-string">"лет"</span>)</pre>
                    </div>

                    <div class="interactive-demo">
                        <div class="demo-title">🎮 Интерактивный пример: Попробуй сам!</div>
                        <div class="demo-content">
                            <div class="input-group">
                                <label>Что вывести на экран?</label>
                                <input type="text" id="printInput" placeholder="Например: Привет!" value="Привет, Python!">
                            </div>
                            <button class="btn" onclick="runPrintDemo()">▶ Запустить print()</button>
                            <div class="demo-output" id="printOutput">
                                >
                            </div>
                        </div>
                    </div>

                    <div class="cards-grid">
                        <div class="card">
                            <div class="card-icon">📌</div>
                            <h3>Важно!</h3>
                            <p>Текст всегда пишется в кавычках: "текст" или 'текст'</p>
                        </div>
                        <div class="card">
                            <div class="card-icon">🔢</div>
                            <h3>Числа</h3>
                            <p>Числа пишутся без кавычек: 42, 3.14, -7</p>
                        </div>
                        <div class="card">
                            <div class="card-icon">💡</div>
                            <h3>Совет</h3>
                            <p>Каждая команда print() начинает новую строку</p>
                        </div>
                    </div>

                    <div class="quiz-container">
                        <div class="quiz-question">❓ Вопрос: Что выведет print("Привет" + " " + "мир")?</div>
                        <div class="quiz-options" id="quiz1">
                            <div class="quiz-option" onclick="selectOption(this, 'quiz1')">Приветмир</div>
                            <div class="quiz-option" onclick="selectOption(this, 'quiz1')">Привет мир</div>
                            <div class="quiz-option" onclick="selectOption(this, 'quiz1')">Ошибка</div>
                        </div>
                        <button class="btn" onclick="checkQuiz('quiz1', 1)">Проверить</button>
                        <div class="quiz-feedback" id="quiz1-feedback"></div>
                    </div>
                `
            },
            2: {
                title: "Урок 2: Переменные и условия (if/elif/else)",
                description: "Научимся хранить данные и принимать решения",
                tags: ["Переменные", "Условия", "if/else"],
                content: `
                    <div class="lesson-header">
                        <h2>📦 Переменные и условия</h2>
                        <p>Переменные - это коробочки для хранения данных. А условия помогают программе принимать решения!</p>
                        <div class="lesson-tags">
                            <span class="tag">📦 Переменные</span>
                            <span class="tag">⚖️ Условия</span>
                            <span class="tag">🔄 if/elif/else</span>
                        </div>
                    </div>

                    <h3>📥 Переменные</h3>
                    <div class="code-block">
                        <button class="copy-btn" onclick="copyCode(this)">📋 Копировать</button>
                        <pre>
<span class="code-comment"># Создаём переменные</span>
name = <span class="code-string">"Анна"</span>      <span class="code-comment"># текст</span>
age = <span class="code-number">25</span>           <span class="code-comment"># число</span>
height = <span class="code-number">1.75</span>       <span class="code-comment"># дробное число</span>
is_student = <span class="code-keyword">True</span>   <span class="code-comment"># логическое значение</span>

<span class="code-comment"># Используем переменные</span>
<span class="code-keyword">print</span>(<span class="code-string">"Меня зовут"</span>, name)
<span class="code-keyword">print</span>(<span class="code-string">"Мне"</span>, age, <span class="code-string">"лет"</span>)</pre>
                    </div>

                    <h3>⚖️ Условия if/elif/else</h3>
                    <div class="code-block">
                        <button class="copy-btn" onclick="copyCode(this)">📋 Копировать</button>
                        <pre>
age = <span class="code-number">18</span>

<span class="code-keyword">if</span> age < <span class="code-number">18</span>:
    <span class="code-keyword">print</span>(<span class="code-string">"Ты ещё школьник"</span>)
<span class="code-keyword">elif</span> age < <span class="code-number">65</span>:
    <span class="code-keyword">print</span>(<span class="code-string">"Ты взрослый"</span>)
<span class="code-keyword">else</span>:
    <span class="code-keyword">print</span>(<span class="code-string">"Ты пенсионер"</span>)

<span class="code-comment"># Операторы сравнения</span>
<span class="code-comment"># ==  равно</span>
<span class="code-comment"># !=  не равно</span>
<span class="code-comment"># <   меньше</span>
<span class="code-comment"># >   больше</span>
<span class="code-comment"># <=  меньше или равно</span>
<span class="code-comment"># >=  больше или равно</span></pre>
                    </div>

                    <div class="interactive-demo">
                        <div class="demo-title">🎮 Калькулятор возраста</div>
                        <div class="demo-content">
                            <div class="input-group">
                                <label>Сколько тебе лет?</label>
                                <input type="number" id="ageInput" min="0" max="120" value="18">
                            </div>
                            <button class="btn" onclick="checkAge()">▶ Проверить</button>
                            <div class="demo-output" id="ageOutput">
                                > Введи свой возраст
                            </div>
                        </div>
                    </div>

                    <div class="cards-grid">
                        <div class="card">
                            <div class="card-icon">📦</div>
                            <h3>Имена переменных</h3>
                            <p>Только буквы, цифры и _. Начинаются с буквы</p>
                        </div>
                        <div class="card">
                            <div class="card-icon">⚖️</div>
                            <h3>if/else</h3>
                            <p>После if всегда ставится двоеточие :</p>
                        </div>
                        <div class="card">
                            <div class="card-icon">🔍</div>
                            <h3>Отступы важны!</h3>
                            <p>В Python отступы показывают, где начинается и заканчивается блок кода</p>
                        </div>
                    </div>

                    <div class="quiz-container">
                        <div class="quiz-question">❓ Что выведет этот код?</div>
                        <div class="code-block" style="margin: 10px 0;">
                            <pre>
x = 10
if x > 5:
    print("Больше 5")
else:
    print("Меньше или равно 5")</pre>
                        </div>
                        <div class="quiz-options" id="quiz2">
                            <div class="quiz-option" onclick="selectOption(this, 'quiz2')">Больше 5</div>
                            <div class="quiz-option" onclick="selectOption(this, 'quiz2')">Меньше или равно 5</div>
                            <div class="quiz-option" onclick="selectOption(this, 'quiz2')">Ошибка</div>
                        </div>
                        <button class="btn" onclick="checkQuiz('quiz2', 0)">Проверить</button>
                        <div class="quiz-feedback" id="quiz2-feedback"></div>
                    </div>
                `
            },
            3: {
                title: "Урок 3: Циклы for, while и команда input()",
                description: "Научимся повторять действия и спрашивать пользователя",
                tags: ["Циклы", "for", "while", "input"],
                content: `
                    <div class="lesson-header">
                        <h2>🔄 Циклы и ввод данных</h2>
                        <p>Циклы помогают повторять действия много раз, а input() позволяет спрашивать пользователя</p>
                        <div class="lesson-tags">
                            <span class="tag">🔄 for</span>
                            <span class="tag">⚡ while</span>
                            <span class="tag">⌨️ input()</span>
                        </div>
                    </div>

                    <h3>⌨️ Команда input()</h3>
                    <p>input() ждёт, пока пользователь что-то введёт с клавиатуры</p>
                    <div class="code-block">
                        <button class="copy-btn" onclick="copyCode(this)">📋 Копировать</button>
                        <pre>
<span class="code-comment"># Спрашиваем имя</span>
name = <span class="code-keyword">input</span>(<span class="code-string">"Как тебя зовут? "</span>)
<span class="code-keyword">print</span>(<span class="code-string">"Привет,"</span>, name)

<span class="code-comment"># input() всегда возвращает текст</span>
<span class="code-comment"># Чтобы получить число, используем int()</span>
age = <span class="code-keyword">int</span>(<span class="code-keyword">input</span>(<span class="code-string">"Сколько тебе лет? "</span>))</pre>
                    </div>

                    <h3>🔄 Цикл for</h3>
                    <p>for используется, когда знаем, сколько раз нужно повторить</p>
                    <div class="code-block">
                        <button class="copy-btn" onclick="copyCode(this)">📋 Копировать</button>

            const options = container.querySelectorAll('.quiz-option');
